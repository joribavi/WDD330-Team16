<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Search Results</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="/js/search.js"></script>
  </head>
  <body>
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <a href="/index.html">Sleep<span class="highlight">Outside</span></a>
      </div>
      <form class="search-form" action="/search.html" method="get">
        <input
          type="search"
          name="q"
          id="search-input"
          placeholder="Search products..."
          aria-label="Search products"
        />
        <button type="submit">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"
              stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
      </form>
      <div class="cart">
        <a href="/cart/index.html">
          <!-- paste your existing cart SVG here -->
        </a>
      </div>
    </header>

    <main class="divider">
      <section class="products">
        <h2 id="search-title">Search Results</h2>
        <ul class="product-list" id="search-results">
          <!-- results injected here -->
        </ul>
      </section>
    </main>

    <footer>
      &copy;2025 ⛺ SleepOutside ⛺ WDD 330 ⛺ BYU-Idaho for BYU-Pathway Worldwide Online
    </footer>
  </body>
</html>
